<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
    <!-- Circular background matching the outer circle -->
    <path
        d="M 250,20 C 377,20 480,123 480,250 C 480,377 377,480 250,480 C 123,480 20,377 20,250 C 20,123 123,20 250,20 Z"
        fill="#EBF0DB" />

    <!-- Define the clipping mask based on the circle's path -->
    <defs>
        <clipPath id="circle-clip">
            <path
                d="M 250,20 C 377,20 480,123 480,250 C 480,377 377,480 250,480 C 123,480 20,377 20,250 C 20,123 123,20 250,20 Z" />
        </clipPath>
    </defs>

    <!-- All inner elements are wrapped in the clip-path -->
    <g clip-path="url(#circle-clip)">
        <!-- Top Bamboo Segment -->
        <!-- ( stroke-width increased to 10 ) -->
        <path
            d="M 246,10 C 246,100 246,150 246,180 C 243,195 231,208 232,220 C 233,233 252,236 272,236 C 307,236 370,236 378,236 C 392,236 397,222 394,208 C 390,190 382,150 382,10"
            fill="#5FAD7E" stroke="#244F36" stroke-width="10" stroke-linecap="round"
            stroke-linejoin="round" />

        <!-- Top Segment Inner Vertical Highlight Line -->
        <!-- ( stroke-width increased to 8.5 ) -->
        <path d="M 345,70 C 347,100 346,130 345,155" fill="none" stroke="#244F36" stroke-width="8.5"
            stroke-linecap="round" />

        <!-- Bottom Bamboo Segment -->
        <!-- ( stroke-width increased to 10 ) -->
        <path
            d="M 246,490 C 246,390 246,330 246,305 C 246,290 231,273 234,260 C 238,247 265,254 280,254 C 320,254 375,253 392,256 C 405,258 402,274 396,288 C 388,325 382,395 382,460"
            fill="#5FAD7E" stroke="#244F36" stroke-width="10" stroke-linecap="round"
            stroke-linejoin="round" />

        <!-- Bottom Segment Inner Vertical Highlight Line -->
        <!-- ( stroke-width increased to 8.5 ) -->
        <path d="M 267,330 C 265,360 264,390 264,445" fill="none" stroke="#244F36"
            stroke-width="8.5" stroke-linecap="round" />

        <!-- Leaves -->
        <!-- ( stroke-width increased to 9 ) -->
        <path
            d="M 224,238 C 214,205 174,135 124,98 C 119,94 114,103 122,123 C 139,158 176,220 224,240"
            fill="#5FAD7E" stroke="#244F36" stroke-width="9" stroke-linecap="round"
            stroke-linejoin="round" />

        <path
            d="M 224,240 C 192,227 134,197 92,172 C 87,169 91,180 102,192 C 124,217 176,242 220,246"
            fill="#5FAD7E" stroke="#244F36" stroke-width="9" stroke-linecap="round"
            stroke-linejoin="round" />
    </g>

    <!-- The Main Outer Circle ( stroke-width increased to 11 ) -->
    <path
        d="M 250,20 C 377,20 480,123 480,250 C 480,377 377,480 250,480 C 123,480 20,377 20,250 C 20,123 123,20 250,20 Z"
        fill="none" stroke="#244F36" stroke-width="11" stroke-linecap="round"
        stroke-linejoin="round" />
</svg>